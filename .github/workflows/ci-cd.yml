name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run linter
        run: npm run lint --if-present || true
      
      - name: Run tests
        run: npm test -- --passWithNoTests
      
      - name: Run tests with coverage
        run: npm run test:coverage --if-present || true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build app
        run: npm run build --if-present || echo "No build script"
      
      - name: Check build artifacts
        run: ls -la dist/ 2>/dev/null || echo "No dist directory"

  eas-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install Expo CLI
        run: npm install -g expo-cli eas-cli
      
      - name: Create EAS config
        run: |
          echo "EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}" >> $GITHUB_ENV
      
      - name: Build with EAS (preview)
        if: github.event.pull_request != null
        run: eas build --platform android --build-type preview --non-interactive || echo "EAS build skipped"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Build with EAS (production)
        if: github.ref == 'refs/heads/main'
        run: eas build --platform all --build-type production --non-interactive || echo "EAS build skipped"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
      
      - name: Perform security scan with Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()
    
    steps:
      - name: Notify on Success
        if: needs.test.result == 'success' && needs.build.result == 'success'
        run: echo "✅ CI/CD pipeline passed successfully"
      
      - name: Notify on Failure
        if: failure()
        run: echo "❌ CI/CD pipeline failed"
